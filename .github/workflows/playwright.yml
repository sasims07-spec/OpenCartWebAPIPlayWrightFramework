name: Playwright Tests

on:
  push:
    branches: [main] # trigger when code is pushed to main branch
  pull_request:
    branches: [main] # trigger when PR is created to main branch
  workflow_dispatch: # manual trigger from GitHub UI

permissions:
  contents: write # required for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest # Linux machine (most common in CI)
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # pulls your repo code into runner

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # install Node.js version

      - name: Install dependencies
        run: npm ci # clean install (faster + reliable for CI)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        # installs browser + required Linux dependencies

      - name: Run tests
        run: npx playwright test --project=chromium
        env:
          ENV: qa
          BASE_URL: ${{ secrets.BASE_URL }}
          OC_USERNAME: ${{ secrets.OC_USERNAME }}
          OC_PASSWORD: ${{ secrets.OC_PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_Token: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/my-html-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # ── Publish Allure report to GitHub Pages ───────────────────────────────
      - name: Checkout gh-pages branch (for history)
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous history into allure-results
        if: always()
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/ || true
            echo "Previous history copied."
          else
            echo "No previous history — first run."
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
